name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'zamel-blog/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zamel-blog/package-lock.json

      - name: Install dependencies (force devDependencies)
        working-directory: zamel-blog
        run: npm ci --include=dev --omit=optional --omit=peer

      - name: Verify build toolchain dependencies
        working-directory: zamel-blog
        run: npm ls vite @vitejs/plugin-vue @vitejs/plugin-vue-jsx --depth=0

      - name: Build site
        working-directory: zamel-blog
        run: |
          npm run build-only -- --outDir ../dist || (
            echo 'Primary build failed, installing missing build toolchain as fallback...' &&
            npm install --no-save --include=dev vite @vitejs/plugin-vue @vitejs/plugin-vue-jsx unplugin-auto-import unplugin-vue-components typescript vue-tsc npm-run-all2 &&
            npm run build-only -- --outDir ../dist
          )

      - name: Verify build output
        run: |
          test -f dist/index.html
          echo "Build artifact verified: dist/index.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
